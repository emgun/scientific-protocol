openapi: 3.1.0
info:
  title: Scientific Protocol Read API
  version: 0.3.0
  description: |
    Public read surface of a Scientific Protocol gateway, plus the shape of the
    signed public-write envelope. This is a v0 contract document: it names the
    stable public endpoints, their query parameters, and the top-level response
    shapes. Field-level payload schemas for protocol objects are published as
    JSON Schemas alongside this file (see `schemas/*.schema.json` in the
    `scientific-protocol` package) and take precedence for object fields.

    Reads are unauthenticated. Writes are wallet-signed envelopes; no API keys
    exist and gateways hold no user keys. Endpoints under /demo and /admin are
    operator/sandbox surfaces and are intentionally not part of this contract.
servers:
  - url: https://api.scientificprotocol.org
    description: Public reference API
  - url: http://127.0.0.1:3000
    description: Local stack (npm run mvp:local)
tags:
  - name: system
  - name: claims
  - name: sources
  - name: participation
  - name: governance
  - name: writes

paths:
  /livez:
    get:
      tags: [system]
      summary: Process liveness and immutable release provenance
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /readyz:
    get:
      tags: [system]
      summary: Read-model migration and database readiness
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
        "503": { description: The configured read model is unavailable or unmigrated. }
  /health:
    get:
      tags: [system]
      summary: Gateway liveness and sync status
      responses:
        "200":
          description: Gateway is serving.
          content:
            application/json:
              schema: { type: object }
  /beta/snapshot:
    get:
      tags: [system]
      summary: Machine-readable beta deployment snapshot (chain, addresses, surfaces)
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /write-config:
    get:
      tags: [system]
      summary: Public write configuration for direct browser-wallet submission
      description: Chain id, RPC URL, contract addresses, and enabled write actions.
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }

  /claims:
    get:
      tags: [claims]
      summary: List claims
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - { name: domainId, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: integer } }
        - { name: author, in: query, schema: { type: string } }
      responses:
        "200":
          description: Page of claims when any filter/pagination parameter is present; full list otherwise.
          content:
            application/json:
              schema: { type: object }
    post:
      tags: [writes]
      summary: Create a claim draft (signed public write)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignedWriteRequest" }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
        "401": { description: Signature or envelope rejected. }
        "405": { description: Gateway is running in read-only mode. }
  /claims/{claimId}:
    get:
      tags: [claims]
      summary: Claim lifecycle detail
      parameters:
        - { name: claimId, in: path, required: true, schema: { type: integer } }
        - name: view
          in: query
          description: "`summary` returns the claim row plus collection counts; default returns the full lifecycle view."
          schema: { type: string, enum: [summary, full] }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
        "404": { $ref: "#/components/responses/NotFound" }
  /claims/{claimId}/publish:
    post:
      tags: [writes]
      summary: Publish a bonded claim draft (signed author write)
      description: |
        The author signs a `claim_publish` envelope scoped to `claim:<claimId>` after depositing
        the complete declared bond directly into BondEscrow. The gateway verifies authorship and
        the onchain bond before submitting the Draft-to-Published transition.
      parameters:
        - { name: claimId, in: path, required: true, schema: { type: integer, minimum: 1 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignedWriteRequest" }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
        "401": { description: Signature or envelope rejected. }
        "403": { description: Signing wallet is not the claim author. }
        "409": { description: Claim is not a draft or its author bond is incomplete. }
        "405": { description: Gateway is running in read-only mode. }
  /feeds/claims:
    get:
      tags: [claims]
      summary: Claim feed (public, paginated)
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - { name: domainId, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: integer } }
        - { name: machineProposed, in: query, schema: { type: boolean } }
        - { name: claimId, in: query, schema: { type: string } }
        - { name: view, in: query, schema: { type: string, enum: [summary, record] } }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /events/claims:
    get:
      tags: [claims]
      summary: Claim lifecycle events
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - { name: claimId, in: query, schema: { type: string } }
        - { name: domainId, in: query, schema: { type: integer } }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }

  /sources:
    get:
      tags: [sources]
      summary: List canonical source records
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
    post:
      tags: [writes]
      summary: Submit a source (signed public write)
      description: |
        All public writes share one shape: a typed envelope plus an EIP-191
        signature from the submitting wallet. The envelope binds action type,
        payload digest, timestamp, and replay-protection nonce. Signing helpers
        are exported by the `scientific-protocol` npm package
        (`createSignedPublicWriteRequest`) and the Python client. A gateway in
        `read-only` service mode rejects this operation with HTTP 405.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignedWriteRequest" }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
        "401": { description: Signature or envelope rejected. }
        "405": { description: Gateway is running in read-only mode. }
        "429": { description: Rate limited. }
  /feeds/sources:
    get:
      tags: [sources]
      summary: Source feed (public, paginated)
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /events/sources:
    get:
      tags: [sources]
      summary: Source lifecycle events
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }

  /replications:
    get:
      tags: [participation]
      summary: List replication records
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /checkpoints:
    get:
      tags: [participation]
      summary: List reputation checkpoints
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /agents:
    get:
      tags: [participation]
      summary: List registered agents
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /artifacts:
    get:
      tags: [participation]
      summary: List artifact commitments and persistence state
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /forecasts:
    get:
      tags: [participation]
      summary: List epistemic-market forecasts
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /challenges:
    get:
      tags: [participation]
      summary: List epistemic-market challenges
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /appeals:
    get:
      tags: [participation]
      summary: List appeals
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /work-items:
    get:
      tags: [participation]
      summary: List work items (review, replication, maintenance, extraction)
      parameters:
        - $ref: "#/components/parameters/limit"
        - { name: claimable, in: query, schema: { type: boolean } }
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }

  /governance/proposals:
    get:
      tags: [governance]
      summary: List governance proposals
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /governance/treasury:
    get:
      tags: [governance]
      summary: Treasury balances and flows
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }
  /governance/events:
    get:
      tags: [governance]
      summary: Governance event history
      responses:
        "200": { $ref: "#/components/responses/JsonObject" }

components:
  parameters:
    limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1 }
    offset:
      name: offset
      in: query
      schema: { type: integer, minimum: 0 }
  responses:
    JsonObject:
      description: JSON object; field-level shapes are defined by the protocol JSON Schemas.
      content:
        application/json:
          schema: { type: object }
    NotFound:
      description: Object does not exist.
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
  schemas:
    SignedWriteRequest:
      type: object
      required: [envelope, signature]
      properties:
        envelope:
          $ref: "#/components/schemas/PublicWriteEnvelope"
        signature:
          type: string
          description: EIP-191 signature of the envelope hash by the submitting wallet.
    PublicWriteEnvelope:
      type: object
      required: [actionType, actorAddress, chainId, issuedAt, payload, requestNonce, scopeKey]
      properties:
        actionType:
          type: string
          enum:
            - claim_create
            - claim_publish
            - claim_draft_from_artifact
            - domain_recompute
            - replication_job_open
            - replication_job_process
            - replication_job_resolve
            - source_submit
            - source_publication_confirm
            - source_publication_reject
        actorAddress: { type: string, pattern: "^0x[a-fA-F0-9]{40}$" }
        chainId: { type: integer, minimum: 1 }
        issuedAt: { type: string, format: date-time }
        payload: { type: object }
        requestNonce: { type: string, minLength: 1 }
        scopeKey: { type: string, minLength: 1 }

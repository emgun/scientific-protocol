name: Release reference service container

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.3.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Validate release version
        id: release
        shell: bash
        run: |
          release_ref="${{ github.event.inputs.tag || github.ref_name }}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$release_ref" != "v$package_version" ]; then
            echo "Release tag $release_ref must be v$package_version"
            exit 1
          fi
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "created=$(git show -s --format=%cI)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable service image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ steps.release.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.release.outputs.created }}
          tags: |
            ghcr.io/emgun/scientific-protocol-service:${{ steps.release.outputs.version }}
            ghcr.io/emgun/scientific-protocol-service:sha-${{ github.sha }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/emgun/scientific-protocol-service
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

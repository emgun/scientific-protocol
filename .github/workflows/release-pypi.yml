name: Release Python client

# Publishes scientific-protocol-client to PyPI via trusted publishing.
# Configure the PyPI project with this repository + workflow as a trusted
# publisher (no API token secrets needed).

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example py-v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke-import the built wheel
        working-directory: python
        run: |
          python -m pip install dist/*.whl
          sp-agent-client --help >/dev/null
          python -c "import scientific_protocol_client"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

name: Release Python client

# Publishes scientific-protocol to PyPI via trusted publishing.
# Configure the PyPI project with this repository + workflow as a trusted
# publisher (no API token secrets needed).

on:
  push:
    tags:
      - "py-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example py-v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release tag
        working-directory: python
        env:
          SP_RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          tag = os.environ["SP_RELEASE_TAG"]
          if not tag.startswith("py-v"):
              raise SystemExit(f"Python release tag must start with py-v: {tag}")

          with open("pyproject.toml", "rb") as config:
              version = tomllib.load(config)["project"]["version"]

          expected = f"py-v{version}"
          if tag != expected:
              raise SystemExit(
                  f"Python release tag {tag} does not match package version {version}; "
                  f"expected {expected}"
              )
          PY

      - name: Build sdist and wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke-import the built wheel
        working-directory: python
        run: |
          python -m pip install dist/*.whl
          sp-agent-client --help >/dev/null
          python -c "import scientific_protocol_client"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

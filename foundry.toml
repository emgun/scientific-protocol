[profile.default]
src = "contracts"
test = "foundry-test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
libs = ["lib"]
remappings = ["@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/"]

[fuzz]
seed = "0x6f70656e736369656e63652d70726f746f636f6c2d66757a7a"

# Keep invariant suites strong but CI-affordable; 64 runs x 250 calls per
# invariant stays well within the workflow's job timeout.
[invariant]
runs = 64
depth = 250
